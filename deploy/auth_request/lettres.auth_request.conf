# =====================================================================
# nginx auth_request — protection SERVEUR des pages/données des modules
# ⚠️ NON ACTIVÉ. À fusionner dans le server{} de lettres.vannesexpress.com
#    et à recharger UNIQUEMENT pendant la fenêtre de test convenue.
#
# Principe : chaque requête vers un module déclenche une sous-requête interne
# /__auth qui vérifie le JWT Supabase (transporté par un COOKIE, car les
# navigations navigateur ne portent pas d'en-tête Authorization). 401 -> redirection login.
# =====================================================================

# Sous-requête d'auth (interne, proxifiée vers le backend /auth/verify)
location = /__auth {
    internal;
    proxy_pass http://127.0.0.1:8000/auth/verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Host $host;
    # transmet le cookie (contenant le token) au vérificateur
    proxy_set_header Cookie $http_cookie;
}

# Redirection vers le login si l'auth échoue
error_page 401 = @login_redirect;
location @login_redirect {
    return 302 /login.html?redirect=$uri;
}

# Pages/données protégées (à gater). NE PAS inclure /login.html, /signup.html,
# /auth/, les assets partagés (js/, fonts), ni le hub racine si on veut y garder
# le guard JS uniquement.
location /medapp/      { auth_request /__auth; try_files $uri $uri/ /index.html; }
location /mediletter/  { auth_request /__auth; try_files $uri $uri/ /index.html; }
location /medentry/    { auth_request /__auth; try_files $uri $uri/ /index.html; }
location /recherche/   { auth_request /__auth; try_files $uri $uri/ /index.html; }

# NB : les endpoints backend de génération sont DÉJÀ protégés par JWT applicatif
# (require_user) — auth_request ici ne concerne QUE le contenu statique.
